<section>

      <h2 class="fw-bold">Account Creation</h2>
      <p>Create an account for our fare services!</p> <!--short intro description-->
  </div>

<br>

<!------------->

<div class="container mt-3">
  <div class="row g-4">

    <div class="col-md-6 mb-3">
        <div class="card">
            <div class="card-body text-center">
                <details class ="ontoggle">
                    <summary>Instructions</summary>
                    <p id="instructions"></p>
                </details>
            </div>
        </div>
    </div>
</div>

<!----Account Details-------------------------------------------------------------------------------------------->

<div class="container mt-4">
  <div class="row g-5">
<form>

    <div class="col-md-6 mb-3">
      <div class="card">
        <div class="card-body">

          <h4 class="fw-bold">Account Details</h4>

          <div class="row">
            <div class="col mb-3 mt-3">
              <label for="text">First Name</label>
              <input type="text" class="form-control" placeholder="Insert first name here">
      
            </div>

            <div class="col mb-3 mt-3">
                <label for="text">Last Name</label>
                <input type="text" class="form-control" placeholder="Insert last name here">
      
            </div>
          </div>

            <div class="col mb-3 mt-3">
                <label for="text">Account Name</label>
                <input type="text" class="form-control" placeholder="Insert account name here">
      
            </div>

            <div class="col mb-3 mt-3">
                <label for="text">Age</label>
                <input type="number" class="form-control" placeholder="Insert age here">
      
            </div>
        
        </div>
      </div>
    </div>

</form>

<!----Contract Details-------------------------------------------------------------------------------------------->

    <div class="col-md-6 mb-3">
      <div class="card">
        <div class="card-body">

          <h4 class="fw-bold">Contact Details</h4>

          <div class="row">           
            <div class="col mb-3 mt-3 text-center">
              <img src="https://i.pinimg.com/736x/8d/2b/ee/8d2bee5caa349cca166838f1b55390d1.jpg" style="width: 100px; height: 100px; border-radius: 100px;">
              <label for="text"><--  Profile Picture</label>
            </div>
                
            <div class="col mb-3 mt-3 text-center">
              <input type="file" class="form-control" accept="image" placeholder="Insert profile picture here">
            </div>

          </div>


          <div class="row">
            <div class="col mb-3 mt-3">
              <label for="text">Email</label>
              <input type="email" class="form-control" placeholder="Insert Email here">
      
            </div>


            <div class="col mb-3 mt-3">
              <label for="text">Phone number</label>
              <input type="text" class="form-control" placeholder="Insert phone number">
    
            </div>

          </div>



<br>

            <div class="form-check">

                            <input type="checkbox" class="form-check-input" id="check1"
                                  name="option1" value="checked">

                            <label class="form-check-label" for="check1" >I accept the terms and conditions</label>

            </div>


            <div style="margin: 20px;">
                    <button type="submit" class="btn btn-success" form action="confirmation.html">Submit</button>

                    <input type="reset" value="Cancel" 
                    style="background-color:  #aa0606; color: white; padding: 5px 5px; border: none; border-radius: 5px; cursor: pointer; text-align:center;">

            </div>

        </div>
      </div>
    </div>
</form>
  </div>
</div>
