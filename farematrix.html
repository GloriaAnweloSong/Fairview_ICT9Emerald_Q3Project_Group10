   <div class="box">
 <div class="container-fluid" style="text-align: center; border-radius: 20px; padding-left: 50px; padding-top: 30px; padding-right: 50px;"><h1 style="padding-top: 30px; text-align: center; color: rgb(255, 255, 255);"><b>Elift</b></h1>
<p style="color: #ffffff; text-align: center;">Elift is only available for specific locations</b></p>

<br><br>

<h3 style="color:  rgb(255, 255, 255); text-align: center;">Pick-up Location:</h3> <!--Uses a dropdown feature instead of an input feature-->
<select class="form-control mb-3" id="Pickup">
   <option value="">Select your location</option>
   <option value="0">OB Montessori Fairview</option>
   <option value="1">SM Fairview</option>
   <option value="2">Fairview terraces</option>
   <option value="30s">UP Town Center</option>
   <option value="40">Eastwood Mall</option>
   <option value="50">Bonificio Global Center, Uptwon Mall</option>
</select>

<h3 style="color:  rgb(255, 255, 255); text-align: center;">Drop-off Location:</h3>
<select class="form-control mb-3" id="Dropoff">
   <option value="">Select Destination</option>
   <option value="0">OB Montessori Fairview</option>
   <option value="1">SM Fairview</option>
   <option value="2">Fairview terraces</option>
   <option value="30">UP Town Center</option>
   <option value="40">Eastwood Mall</option>
   <option value="50">Bonificio Global Center, Uptwon Mall</option>
</select>

<br>

<div style="text-align: center;">

<button id="Regular" name="Regular" type="button" style="border-radius: 10px; background-color: rgb(255, 255, 255); font-size: 20px; color: rgb(0, 0, 0);" class="btn" onclick="calculateFare('regular')">Submit</button>

<button id="discount" name="discount" type="button" style="border-radius: 10px; background-color: rgb(255, 255, 255); font-size: 20px; color: rgb(0, 0, 0);" class="btn" onclick="calculateFare('discount')">Discounted</button>

<div id="Output" style="color: rgb(255, 255, 255); margin-top: 20px; font-size: 18px;"></div>


<script>
function calculateFare(type) {

   let Pickup, Dropoff, basefare, baseKM, perKMrate, distance, extraKM;

   Pickup = parseFloat(document.getElementById("Pickup").value);
   Dropoff = parseFloat(document.getElementById("Dropoff").value);

      if (isNaN(Pickup) || isNaN(Dropoff)) {
       alert("Please choose pick up and drop off locations.");
       return;
   }

   if (Pickup === Dropoff) {
       alert("You have selected the same pick up and drop off locations.");
       return;
   }


   basefare = 50;
   perKMrate = 15;
   baseKM = 2;

   distance = Math.max(Math.abs(Dropoff - Pickup), 0);
   extraKM = Math.max(distance - baseKM, 0);

   let fare = basefare + (extraKM * perKMrate);

   if (type === "discount") {
       fare = fare * 0.8;
   }

   document.getElementById("Output").innerHTML = "Your total is ₱ " + fare.toFixed(2) + "!";

}
</script>
